# -----------------------------------------------------------------------------
# Shopify -> Bexio transformer configuration
# Copy this file to `config.yaml` and adjust the values to match YOUR Bexio setup.
# Anything here can be overridden without touching the code.
# -----------------------------------------------------------------------------

# Folder (relative to project root) where you drop the raw Shopify CSV exports.
input_dir: input
# Folder where the Bexio-ready CSVs are written.
output_dir: output

# Which Shopify export files to look for in input_dir.
# The transformer auto-detects by columns, but these hints speed it up and let
# you rename files freely.
files:
  products: products_export*.csv        # Products > Export
  orders: orders_export*.csv            # Orders > Export (with line items)
  transactions: transactions_export*.csv # Orders > Export transaction histories (optional)
  payouts: payouts*.csv                  # Settings > Payments > Payouts > Export (optional)

# ---- Accounting defaults (CONFIRM THESE against your Bexio chart of accounts) --
accounting:
  # Income account that product sales are booked to (Swiss KMU chart: 3200/3400).
  income_account: "3200"
  # Account used for shipping revenue (often the same as income_account).
  shipping_account: "3200"
  # Bexio VAT / tax-rate CODE applied to taxable positions.
  #   Examples seen in Bexio: UN81 (8.1% standard), UN26 (2.6% reduced),
  #   UEX (no VAT obligation / exempt). Confirm the exact codes in your account.
  vat_code_standard: "UN81"
  # VAT code for positions marked non-taxable in Shopify.
  vat_code_exempt: "UEX"
  # Bank/clearing account that customer payments land in (for the payments export).
  payment_account: "1020"

# ---- Formatting -------------------------------------------------------------
formatting:
  # Date format Bexio expects on import (Swiss default is day.month.year).
  date_format: "%d.%m.%Y"
  # Decimal separator for numbers written to the output CSV.
  # Use "." for standard CSV, "," if your Bexio import expects Swiss decimals.
  decimal_separator: "."
  # CSV delimiter for the OUTPUT files.
  output_delimiter: ";"

# ---- Behaviour --------------------------------------------------------------
options:
  # Add shipping cost as its own invoice position when > 0.
  shipping_as_position: true
  # Only export orders whose Financial Status is in this list (empty = all).
  order_financial_status_filter: []      # e.g. ["paid", "partially_refunded"]
  # Treat an order as a "company" contact (Contact type 1) when a billing
  # company name is present; otherwise "person" (Contact type 2).
  company_when_billing_company: true
